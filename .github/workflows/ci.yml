
name: Modified Java CI
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
        - ubuntu-latest
        java:
        - 8
      fail-fast: false
      max-parallel: 4
    name: test (${{ matrix.os }}, ${{ matrix.java }})
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java }}
        distribution: zulu
    - name: Verify with Maven
      run: mvn verify -B
'on':
- push
- workflow_dispatch
